name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ -d "/home/ec2-user/timer-backend" ]; then
              cd /home/ec2-user/timer-backend
            elif [ -d "~/timer-backend" ]; then
              cd ~/timer-backend
            elif [ -d "/home/ec2-user/hrms/timer-backend" ]; then
              cd /home/ec2-user/hrms/timer-backend
            else
              echo "Backend directory not found"
              exit 1
            fi
            
            git pull origin main
            npm install
            
            pm2 delete backend || true
            pm2 start ecosystem.config.js --max-memory-restart 500M
            pm2 save
            pm2 status
